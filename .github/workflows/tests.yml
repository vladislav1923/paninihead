name: Tests

on:
  pull_request:
  push:
    branches: [ "main" ]

jobs:
  jest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Yarn (Corepack)
        run: |
          corepack enable
          corepack prepare yarn@4.9.1 --activate
          corepack yarn --version

      - name: Install dependencies
        run: corepack yarn install --immutable

      - name: Run unit tests
        run: corepack yarn test
        env:
          CI: true

  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: paninihead
        options: >-
          --health-cmd "pg_isready -U user -d paninihead"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      POSTGRES_URL: postgresql://user:password@localhost:5432/paninihead
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Yarn (Corepack)
        run: |
          corepack enable
          corepack prepare yarn@4.9.1 --activate
          corepack yarn --version

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('yarn.lock') }}

      - name: Install dependencies
        run: corepack yarn install --immutable

      - name: Install Playwright Chromium
        run: corepack yarn exec playwright install chromium --with-deps

      - name: Apply database migrations
        run: corepack yarn exec prisma migrate deploy

      - name: Run Playwright tests
        run: corepack yarn test:e2e
        env:
          CI: true

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
